name: Auto Login with Cloudflare Bypass

on:
  # 可以根据需要调整触发方式
  schedule:
    - cron: '0 9 * * *'   # 每天 UTC 时间 9:00 运行（可根据需求修改）
  workflow_dispatch:       # 支持手动触发

jobs:
  login:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'   # 指定 Python 版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          pip install bypass
          # 如果 bypass 模块需要额外依赖，也在此安装
          # 例如：pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          # 如果需要其他浏览器可以添加，例如：playwright install firefox

      - name: Run login script
        env:
          WEBSITE_URL: ${{ secrets.WEBSITE_URL }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 如果 bypass 模块需要其他环境变量，也在此添加
        run: python login.py   # 假设脚本文件名为 login.py

      - name: Upload failure screenshot (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: login-failure-screenshot
          path: login-failure.png