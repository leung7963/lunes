name: Install Cloudflare Bypass with Python

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      # 检出外部仓库（不检出当前仓库）
      - name: Checkout external repository
        uses: actions/checkout@v4
        with:
          repository: 1837620622/cloudflare-bypass-2026
          path: cloudflare-bypass-2026

      # 设置 Python 环境（可根据需要调整版本）
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'  # 使用最新的 Python 3，也可指定具体版本如 '3.10'

      # 验证 Python 是否安装成功
      - name: Verify Python
        run: python --version

      # 执行安装脚本
      - name: Run install script
        run: |
          cd cloudflare-bypass-2026
          sudo bash install_linux.sh

      - name: Bypass
        run: python -u bypass.py https://betadash.lunes.host/login?next=/servers/59292